# Server Configuration
server.port=8081

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/chatsphere
spring.datasource.username=root
# SECURED: Replaced hardcoded password with Environment Variable
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JSON Output Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
# SECURED: Replaced hardcoded secret with Environment Variable
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origin=http://localhost:3001

# Logging Levels
logging.level.com.chatsphere=DEBUG
logging.level.org.springframework.security=INFO

# ── File Storage ──────────────────────────────────────────────
# FIXED: Changed absolute C:/ drive path to a relative project path
upload.base-dir=uploads/
 
# ── Multipart upload limits ───────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Email Settings ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=chatsphere.app.mail@gmail.com
# SECURED: Replaced hardcoded email password with Environment Variable
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# System Intelligence Config
# SECURED: Replaced hardcoded API key with Environment Variable
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash